kind: AdaptiveDialog
modelDescription: |-
  Use this topic when the user asks about THEIR OWN government-issued IDs / immigration documents / identity documents stored in Workday — Social Security Number (SSN), national ID, passport, driver's license, tax ID, PAN card, Aadhaar, National Insurance (NI) number, SIN, visa, work visa, work permit, work authorization, green card, permanent resident (PR) card, or related fields. Data belongs exclusively to the requesting user.

  Trigger on "my" government-ID queries: "What is my SSN / PAN / Aadhaar / NI number?", "What's my passport number?", "When does my visa / work permit expire?", "Show my driver's license on file", "What's my tax ID?", "What government IDs are on my Workday profile?", "What's my green card / PR status?".

  Do NOT trigger for general questions about ID applications, renewals, immigration law, or work authorization policy
inputs:
  - kind: AutomaticTaskInput
    propertyName: EmployeeName
    description: The name of the employee whose data is being requested.
    entity: PersonNamePrebuiltEntity
    shouldPromptUser: false
    inputSettings:
      repeatCount: 0

beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    triggerQueries:
      - What are my Government Ids?
      - Which Government ids are available on my profile?
      - Show my Government Ids?
      - Show me [EmployeeName]'s government Ids

  actions:
    - kind: BeginDialog
      id: GlRaX3
      displayName: Check user access
      input:
        binding:
          EmployeeName: =Topic.EmployeeName

      dialog: msdyn_copilotforemployeeselfservicedahr.topic.WorkdaySystemAccessCheck

    - kind: BeginDialog
      id: 3bFDxH
      displayName: Redirect to Workday System Get Common Execution
      input:
        binding:
          parameters: ="{""params"":[{""key"":""{Employee_ID}"",""value"":""" & Global.ESS_UserContext_Employee_Id & """},{""key"":""{As_Of_Effective_Date}"",""value"":"""& Text(Today(), "yyyy-MM-dd") &"""}]}"
          scenarioName: ="msdyn_HRWorkdayHCMEmployeeGetGovernmentIds"

      dialog: msdyn_copilotforemployeeselfservicedahr.topic.WorkdaySystemGetCommonExecution
      output:
        binding:
          errorResponse: Topic.errorResponse
          isSuccess: Topic.isSuccess
          workdayResponse: Topic.workdayResponse

    - kind: ParseValue
      id: v0OBu2
      displayName: Parse workdayResponse into table
      variable: Topic.parsedWorkdayResponse
      valueType:
        kind: Record
        properties:
          GovernmentId:
            type:
              kind: Table
              properties:
                Country_Reference:
                  type:
                    kind: Record
                    properties:
                      ID:
                        type:
                          kind: Table
                          properties:
                            "@type": String
                            "#text": String

                Expiration_Date: String
                ID: String
                ID_Type_Reference:
                  type:
                    kind: Record
                    properties:
                      ID:
                        type:
                          kind: Table
                          properties:
                            "@type": String
                            "#text": String

                Issued_Date: String

      value: =Topic.workdayResponse

    - kind: BeginDialog
      id: 6k3mYE
      displayName: Refresh country name reference data
      input:
        binding:
          IsTableEmpty: =IsBlank(Global.CountryNameLookupTable)
          ReferenceDataKey: ISO_3166-1_Alpha-2_Code

      dialog: msdyn_copilotforemployeeselfservicedahr.topic.WorkdaySystemRefreshReferenceData

    - kind: BeginDialog
      id: Xoydcu
      displayName: Refresh government ID type data
      input:
        binding:
          IsTableEmpty: =IsBlank(Global.GovernmentIdTypeLookupTable)
          ReferenceDataKey: Government_ID_Type_ID

      dialog: msdyn_copilotforemployeeselfservicedahr.topic.WorkdaySystemRefreshReferenceData

    - kind: SetVariable
      id: setVariable_ZYrAxQ
      displayName: Get values from reference tables
      variable: Topic.finalizedResponseTableData
      value: |-
        =ForAll(
            Topic.parsedWorkdayResponse.GovernmentId,
            With(
                {currentRecord: ThisRecord},
                {
                    EmployeeName: Global.ESS_UserContext_Employee_Firstname & " " & Global.ESS_UserContext_Employee_Lastname,
                    CountryName: LookUp(
                            Global.CountryNameLookupTable,
                            ID = LookUp(
                                currentRecord.Country_Reference.ID, 
                                '@type' = First(Global.CountryNameLookupTable).Reference_ID_Type
                            ).'#text'
                        ).Referenced_Object_Descriptor,
                    ExpirationDate: currentRecord.Expiration_Date,
                    IDType: LookUp(
                            Global.GovernmentIdTypeLookupTable,
                            ID = LookUp(
                                currentRecord.ID_Type_Reference.ID, 
                                '@type' = First(Global.GovernmentIdTypeLookupTable).Reference_ID_Type
                            ).'#text'
                        ).Referenced_Object_Descriptor,
                    IssuedDate: currentRecord.Issued_Date,
                    ID: ID
                }
            )
        )

inputType:
  properties:
    EmployeeName:
      displayName: EmployeeName
      description: The name of the employee whose data is being requested.
      type: String

outputType:
  properties:
    finalizedResponseTableData:
      displayName: finalizedResponseTableData
      type:
        kind: Table
        properties:
          CountryName: String
          EmployeeName: String
          ExpirationDate: String
          ID: String
          IDType: String
          IssuedDate: String