kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: InputAction
    description: "Look for keywords 'get', 'view', 'show', 'list', 'see', 'display', or 'what are' in the user's request. If found, extract 'get'. Otherwise extract 'manage'."
    entity: StringPrebuiltEntity
    shouldPromptUser: false

modelDescription: |-
  Update emergency contacts for the requesting user only. Supports update via Workday (Human_Resources). Reject requests about other people's data.
  Formatting: ALWAYS display contacts in a markdown table with columns: Name, Relationship, Phone, Address. Mark primary with ★. Sort primary first, then by priority. Use "—" for missing fields. Heading: "Your emergency contacts" with divider. Never use bullet lists. Hide internal IDs (WID, Priority number, Country Codes). Show ALL contacts.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent: {}
  actions:
    - kind: SetVariable
      id: set_workday_icon_url_2
      variable: Topic.WorkdayIconUrl
      value: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=

    - kind: ConditionGroup
      id: check_country_codes
      conditions:
        - id: country_codes_uninitialized
          condition: =IsBlank(Global.CountryCodeLookupTable)
          displayName: If country code picklist is uninitialized
          actions:
            - kind: BeginDialog
              id: fetch_country_codes
              displayName: Redirect to Workday System Get Reference Data
              input:
                binding:
                  referenceDataKey: Country_Phone_Code_ID

              dialog: msdyn_copilotforemployeeselfservicehr.topic.GetReferenceData

    - kind: ConditionGroup
      id: check_relationship_types
      conditions:
        - id: relationship_types_uninitialized
          condition: =IsBlank(Global.RelatedPersonRelationshipLookupTable)
          displayName: If relationship type picklist is uninitialized
          actions:
            - kind: BeginDialog
              id: fetch_relationship_types
              displayName: Redirect to Workday System Get Reference Data
              input:
                binding:
                  referenceDataKey: Related_Person_Relationship_ID

              dialog: msdyn_copilotforemployeeselfservicehr.topic.GetReferenceData

    # Detect if user wants to view contacts only (get/view/show/list)
    - kind: SetVariable
      id: set_is_view_only
      variable: Topic.isViewOnly
      value: =(!IsBlank(Topic.InputAction) && "get" in Lower(Topic.InputAction)) || "get" in Lower(System.Activity.Text) || "view" in Lower(System.Activity.Text) || "show" in Lower(System.Activity.Text) || "list" in Lower(System.Activity.Text) || "see my" in Lower(System.Activity.Text) || "what are" in Lower(System.Activity.Text) || "display" in Lower(System.Activity.Text)

    - kind: BeginDialog
      id: fetch_emergency_contacts
      displayName: Fetch existing emergency contacts
      input:
        binding:
          parameters: ="{""params"":[{""key"":""{Employee_ID}"",""value"":""" & Global.ESS_UserContext_Employee_Id & """},{""key"":""{As_Of_Effective_Date}"",""value"":"""& Text(Today(), "yyyy-MM-dd") &"""}]}"
          scenarioName: msdyn_HRWorkdayHCMEmployeeGetEmergencyContactInfo

      dialog: msdyn_copilotforemployeeselfservicehr.topic.WorkdaySystemGetCommonExecution
      output:
        binding:
          errorResponse: Topic.fetchErrorResponse
          isSuccess: Topic.fetchIsSuccess
          workdayResponse: Topic.existingContactsResponse

    - kind: ParseValue
      id: parse_contacts
      displayName: Parse emergency contacts response
      variable: Topic.parsedContacts
      valueType:
        kind: Record
        properties:
          EmergencyContacts:
            type:
              kind: Table
              properties:
                Emergency_Contact:
                  type:
                    kind: Record
                    properties:
                      Emergency_Contact_Data:
                        type:
                          kind: Record
                          properties:
                            @Primary: String
                            @Priority: String
                            Emergency_Contact_ID: String

                      Emergency_Contact_Reference:
                        type:
                          kind: Record
                          properties:
                            @Descriptor: String
                            ID:
                              type:
                                kind: Table
                                properties:
                                  @type: String
                                  "#text": String

                Person_Reference:
                  type:
                    kind: Record
                    properties:
                      @Descriptor: String

                Personal_Data:
                  type:
                    kind: Record
                    properties:
                      Contact_Data:
                        type:
                          kind: Record
                          properties:
                            Address_Data:
                              type:
                                kind: Table
                                properties:
                                  @Formatted_Address: String
                                  Address_Line_Data:
                                    type:
                                      kind: Record
                                      properties:
                                        "#text": String

                                  Country_Reference:
                                    type:
                                      kind: Record
                                      properties:
                                        ID:
                                          type:
                                            kind: Table
                                            properties:
                                              @type: String
                                              "#text": String

                                  Country_Region_Reference:
                                    type:
                                      kind: Record
                                      properties:
                                        ID:
                                          type:
                                            kind: Table
                                            properties:
                                              @type: String
                                              "#text": String

                                  Municipality: String
                                  Postal_Code: String

                            Phone_Data:
                              type:
                                kind: Record
                                properties:
                                  @Tenant_Formatted_Phone: String
                                  International_Phone_Code: String
                                  Phone_Number: String

                      Name_Data:
                        type:
                          kind: Record
                          properties:
                            Legal_Name_Data:
                              type:
                                kind: Record
                                properties:
                                  Name_Detail_Data:
                                    type:
                                      kind: Record
                                      properties:
                                        @Formatted_Name: String
                                        First_Name: String
                                        Last_Name: String

                Related_Person_Relationship_Reference:
                  type:
                    kind: Table
                    properties:
                      @Descriptor: String
                      ID:
                        type:
                          kind: Table
                          properties:
                            @type: String
                            "#text": String

      value: =Topic.existingContactsResponse

    - kind: SetVariable
      id: set_contact_list
      displayName: Transform contacts for display
      variable: Topic.contactSelectionList
      value: |
        =ForAll(
            Filter(
                Topic.parsedContacts.EmergencyContacts,
                !IsBlank(LookUp(ThisRecord.Emergency_Contact.Emergency_Contact_Reference.ID, '@type' = "WID").'#text')
            ),
            {
                DisplayName: ThisRecord.Personal_Data.Name_Data.Legal_Name_Data.Name_Detail_Data.'@Formatted_Name',
                FirstName: ThisRecord.Personal_Data.Name_Data.Legal_Name_Data.Name_Detail_Data.First_Name,
                LastName: ThisRecord.Personal_Data.Name_Data.Legal_Name_Data.Name_Detail_Data.Last_Name,
                Phone: ThisRecord.Personal_Data.Contact_Data.Phone_Data.'@Tenant_Formatted_Phone',
                PhoneNumber: ThisRecord.Personal_Data.Contact_Data.Phone_Data.Phone_Number,
                PhoneCountryCode: ThisRecord.Personal_Data.Contact_Data.Phone_Data.International_Phone_Code,
                Address: First(ThisRecord.Personal_Data.Contact_Data.Address_Data).'@Formatted_Address',
                AddressLine1: First(ThisRecord.Personal_Data.Contact_Data.Address_Data).Address_Line_Data.'#text',
                City: First(ThisRecord.Personal_Data.Contact_Data.Address_Data).Municipality,
                PostalCode: First(ThisRecord.Personal_Data.Contact_Data.Address_Data).Postal_Code,
                StateProvince: LookUp(First(ThisRecord.Personal_Data.Contact_Data.Address_Data).Country_Region_Reference.ID, '@type' = "Country_Region_ID").'#text',
                CountryCode: LookUp(First(ThisRecord.Personal_Data.Contact_Data.Address_Data).Country_Reference.ID, '@type' = "ISO_3166-1_Alpha-3_Code").'#text',
                RelationshipType: First(ThisRecord.Related_Person_Relationship_Reference).'@Descriptor',
                RelationshipTypeID: LookUp(First(ThisRecord.Related_Person_Relationship_Reference).ID, '@type' = "Related_Person_Relationship_ID").'#text',
                IsPrimary: ThisRecord.Emergency_Contact.Emergency_Contact_Data.'@Primary',
                Priority: ThisRecord.Emergency_Contact.Emergency_Contact_Data.'@Priority',
                WID: LookUp(ThisRecord.Emergency_Contact.Emergency_Contact_Reference.ID, '@type' = "WID").'#text'
            }
        )

    - kind: ConditionGroup
      id: check_contacts_exist
      conditions:
        - id: has_existing_contacts
          condition: =CountRows(Topic.contactSelectionList) > 0
          displayName: If user has existing emergency contacts
          actions:
            - kind: SetVariable
              id: build_selection_choices
              displayName: Build selection choices
              variable: Topic.selectionChoices
              value: |
                =ForAll(
                    Filter(
                        SortByColumns(Topic.contactSelectionList, "IsPrimary", SortOrder.Descending, "Priority", SortOrder.Ascending),
                        !IsBlank(ThisRecord.DisplayName) && !IsBlank(ThisRecord.WID)
                    ),
                    {
                        title: If(IsBlank(ThisRecord.DisplayName), "Unknown Contact", ThisRecord.DisplayName),
                        value: ThisRecord.WID
                    }
                )

            - kind: SetVariable
              id: set_workday_url_2
              variable: Topic.WorkdayUrl
              value: https://impl.workday.com/<TENANT_NAME>/home.htmld

            - kind: SetVariable
              id: build_contact_table
              displayName: Build formatted contact table
              variable: Topic.contactTableText
              value: |
                ="| Name | Relationship | Phone | Address |" & Char(10) & "|------|-------------|-------|---------|" & Char(10) & Concat(
                    SortByColumns(Topic.contactSelectionList, "IsPrimary", SortOrder.Descending, "Priority", SortOrder.Ascending),
                    "| " & If(!IsBlank(ThisRecord.DisplayName), ThisRecord.DisplayName, "Unknown") & If(ThisRecord.IsPrimary = "true" || ThisRecord.IsPrimary = "1", " ★", "") & " | " & If(!IsBlank(ThisRecord.RelationshipType), ThisRecord.RelationshipType, "—") & " | " & If(!IsBlank(ThisRecord.Phone), ThisRecord.Phone, "—") & " | " & If(!IsBlank(ThisRecord.Address), ThisRecord.Address, "—") & " |",
                    Char(10)
                )

            # View-only mode: show table as Adaptive Card (full width) and end
            - kind: ConditionGroup
              id: check_view_only
              conditions:
                - id: is_view_only_mode
                  condition: =Topic.isViewOnly = true
                  displayName: User only wants to view contacts
                  actions:
                    - kind: SetVariable
                      id: set_view_intro_text
                      variable: Topic.viewIntroText
                      value: ="Here are your emergency contacts from [Workday](" & Topic.WorkdayUrl & "), an HR platform your company uses."

                    - kind: SendActivity
                      id: view_only_intro
                      activity: "{Topic.viewIntroText}"

                    - kind: SendActivity
                      id: view_only_table_card
                      activity:
                        attachments:
                          - kind: AdaptiveCardTemplate
                            cardContent: |-
                              ={
                                type: "AdaptiveCard",
                                '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                                version: "1.3",
                                body: [
                                  {
                                    type: "TextBlock",
                                    text: "Your emergency contacts (" & Text(CountRows(Topic.contactSelectionList)) & ")",
                                    weight: "Bolder",
                                    size: "Medium",
                                    wrap: true
                                  },
                                  {
                                    type: "ColumnSet",
                                    separator: true,
                                    spacing: "Medium",
                                    columns: [
                                      { type: "Column", width: 2, items: [{ type: "TextBlock", text: "Name", weight: "Bolder", wrap: true }] },
                                      { type: "Column", width: 2, items: [{ type: "TextBlock", text: "Relationship", weight: "Bolder", wrap: true }] },
                                      { type: "Column", width: 2, items: [{ type: "TextBlock", text: "Phone", weight: "Bolder", wrap: true }] },
                                      { type: "Column", width: 3, items: [{ type: "TextBlock", text: "Address", weight: "Bolder", wrap: true }] }
                                    ]
                                  },
                                  {
                                    type: "Container",
                                    items: ForAll(
                                      SortByColumns(Topic.contactSelectionList, "IsPrimary", SortOrder.Descending, "Priority", SortOrder.Ascending),
                                      {
                                        type: "ColumnSet",
                                        separator: true,
                                        columns: [
                                          { type: "Column", width: 2, items: [{ type: "TextBlock", text: If(!IsBlank(ThisRecord.DisplayName), ThisRecord.DisplayName, "Unknown") & If(ThisRecord.IsPrimary = "true" || ThisRecord.IsPrimary = "1", " ★", ""), wrap: true }] },
                                          { type: "Column", width: 2, items: [{ type: "TextBlock", text: If(!IsBlank(ThisRecord.RelationshipType), ThisRecord.RelationshipType, "—"), wrap: true }] },
                                          { type: "Column", width: 2, items: [{ type: "TextBlock", text: If(!IsBlank(ThisRecord.Phone), ThisRecord.Phone, "—"), wrap: true }] },
                                          { type: "Column", width: 3, items: [{ type: "TextBlock", text: If(!IsBlank(ThisRecord.Address), ThisRecord.Address, "—"), wrap: true }] }
                                        ]
                                      }
                                    )
                                  }
                                ]
                              }

                    - kind: SendActivity
                      id: view_only_footer
                      activity: "If you need to update any information for these contacts, just let me know which one you'd like to change."

                    - kind: CancelAllDialogs
                      id: end_view_only

            - kind: SetVariable
              id: set_intro_msg_text
              variable: Topic.introMsgText
              value: ="Sure, I can help you with that. Here's where you can update your emergency contacts. I've identified " & Text(CountRows(Topic.selectionChoices)) & " emergency contact(s) of yours from [Workday](" & Topic.WorkdayUrl & "), an HR platform your company uses."

            - kind: SendActivity
              id: intro_selection_msg
              activity: "{Topic.introMsgText}"

            - kind: AdaptiveCardPrompt
              id: select_contact_card
              displayName: Select emergency contact to update
              card: |-
                ={
                  type: "AdaptiveCard",
                  '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
                  version: "1.5",
                  body: [
                    {
                      type: "TextBlock",
                      text: "Select an emergency contact to update",
                      weight: "Bolder",
                      size: "Medium",
                      wrap: true,
                      spacing: "Medium"
                    },
                    {
                      type: "TextBlock",
                      text: "You have " & CountRows(Topic.selectionChoices) & " emergency contact(s). Select a contact to update.",
                      wrap: true,
                      spacing: "Small"
                    },
                    {
                      type: "Input.ChoiceSet",
                      id: "selectedContact",
                      label: "Emergency contact",
                      style: "compact",
                      isRequired: true,
                      errorMessage: "Please select an emergency contact.",
                      choices: ForAll(Topic.selectionChoices, { title: ThisRecord.title, value: ThisRecord.value }),
                      value: First(Topic.selectionChoices).value
                    }
                  ],
                  actions: [
                    { type: "Action.Submit", title: "Continue", id: "Continue", data: { actionSubmitId: "Continue" } }
                  ]
                }
              output:
                binding:
                  actionSubmitId: Topic.selectionActionId
                  selectedContact: Topic.selectedContactWID

              outputType:
                properties:
                  actionSubmitId: String
                  selectedContact: String

            - kind: ConditionGroup
              id: handle_selection_cancel
              conditions:
                - id: selection_cancelled
                  condition: =Topic.selectionActionId = "Cancel"
                  actions:
                    - kind: SendActivity
                      id: selection_cancel_msg
                      activity: Your request has been cancelled. Is there anything else you need help with?

                    - kind: CancelAllDialogs
                      id: selection_cancel_all

            - kind: ConditionGroup
              id: set_mode
              conditions:
                - id: is_update_mode
                  condition: =Topic.selectionActionId = "Continue"
                  displayName: Update existing contact
                  actions:
                    - kind: SetVariable
                      id: set_update_mode
                      variable: Topic.isUpdateMode
                      value: =true

                    - kind: SetVariable
                      id: set_selected_contact_data
                      variable: Topic.selectedContactData
                      value: =LookUp(Topic.contactSelectionList, WID = Topic.selectedContactWID)

      elseActions:
        - kind: SendActivity
          id: no_contacts_msg
          activity: You don't have any emergency contacts configured yet. You can add one in [Workday](https://impl.workday.com/<TENANT_NAME>/home.htmld), your company's HR portal.

        - kind: CancelAllDialogs
          id: end_no_contacts

    # Show context message before form (only for update mode)
    - kind: ConditionGroup
      id: show_update_context_msg
      conditions:
        - id: is_update_show_msg
          condition: =Topic.isUpdateMode = true
          actions:
            - kind: SetVariable
              id: set_update_context_text
              variable: Topic.updateContextText
              value: ="You've pulled up " & Topic.selectedContactData.FirstName & " " & Topic.selectedContactData.LastName & "'s emergency contact details. In this form you can edit details or remove " & Topic.selectedContactData.FirstName & " from your emergency contacts."

            - kind: SendActivity
              id: update_context_msg
              activity: "{Topic.updateContextText}"

    # Step 1: Country selection card (needed to filter states in the next card)
    - kind: AdaptiveCardPrompt
      id: country_selection_card
      displayName: Select country for address
      card: |-
        ={
          type: "AdaptiveCard",
          '$schema': "http://adaptivecards.io/schemas/adaptive-card.json",
          version: "1.5",
          body: [
            {
              type: "TextBlock",
              text: "Select country",
              weight: "Bolder",
              size: "Medium",
              wrap: true,
              spacing: "Medium"
            },
            {
              type: "TextBlock",
              text: "Choose the country for this contact's address. The state/province options in the next step will be filtered accordingly.",
              wrap: true,
              size: "Small",
              spacing: "Small"
            },
            {
              type: "Input.ChoiceSet",
              id: "countryCode",
              label: "Country",
              style: "compact",
              isRequired: true,
              errorMessage: "Please select a country.",
              choices: [
                { title: "United States", value: "USA" },
                { title: "Canada", value: "CAN" },
                { title: "United Kingdom", value: "GBR" },
                { title: "India", value: "IND" },
                { title: "Australia", value: "AUS" },
                { title: "Germany", value: "DEU" },
                { title: "France", value: "FRA" },
                { title: "Japan", value: "JPN" },
                { title: "China", value: "CHN" },
                { title: "Brazil", value: "BRA" },
                { title: "Mexico", value: "MEX" },
                { title: "Italy", value: "ITA" },
                { title: "Spain", value: "ESP" },
                { title: "Netherlands", value: "NLD" },
                { title: "Singapore", value: "SGP" },
                { title: "Ireland", value: "IRL" },
                { title: "Israel", value: "ISR" },
                { title: "South Korea", value: "KOR" },
                { title: "Switzerland", value: "CHE" },
                { title: "Sweden", value: "SWE" }
              ],
              value: If(Topic.isUpdateMode, Topic.selectedContactData.CountryCode, "USA")
            }
          ],
          actions: [
            { type: "Action.Submit", title: "Continue", id: "Continue", data: { actionSubmitId: "Continue" } },
            { type: "Action.Submit", title: "Cancel", id: "Cancel", data: { actionSubmitId: "Cancel" }, associatedInputs: "none" }
          ]
        }
      output:
        binding:
          actionSubmitId: Topic.countrySelectionActionId
          countryCode: Topic.countryCode

      outputType:
        properties:
          actionSubmitId: String
          countryCode: String

    - kind: ConditionGroup
      id: handle_country_cancel
      conditions:
        - id: country_cancelled
          condition: =Topic.countrySelectionActionId = "Cancel"
          actions:
            - kind: SendActivity
              id: country_cancel_msg
              activity: Your request has been cancelled. Is there anything else you need help with?

            - kind: CancelAllDialogs
              id: country_cancel_all

    # Step 2: Build filtered state/province choices based on selected country
    - kind: SetVariable
      id: set_all_state_choices
      variable: Topic.allStateProvinceChoices
      value: |
        =[
          { title: "Alabama", value: "USA-AL", country: "USA" },
          { title: "Alaska", value: "USA-AK", country: "USA" },
          { title: "Arizona", value: "USA-AZ", country: "USA" },
